    <script>
    function getDeviceId() {
    let id = localStorage.getItem("device_id");
    if (!id) {
        id = "dev_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("device_id", id);
    }
    return id;
}
        const firebaseConfig = {
            apiKey: "AIzaSyCyDd6rCV7WaQe8sMF0Xmob3dpm6z6wEEQ",
            authDomain: "myapps-4a8eb.firebaseapp.com",
            databaseURL: "https://myapps-4a8eb-default-rtdb.firebaseio.com",
            projectId: "myapps-4a8eb",
            storageBucket: "myapps-4a8eb.appspot.com",
            messagingSenderId: "342267842050",
            appId: "1:342267842050:web:4749870bb18b05ed94611b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMovies = [];
        let currentIndex = 20; 
        let currentMovies = [];

        // --- IndexedDB Logic ---
        const dbName = "MovieAppDB";
        const storeName = "movies";
        let indexedDBInstance;

        function openDatabase() {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    e.target.result.createObjectStore(storeName, { keyPath: "title" });
                };
                request.onsuccess = (e) => {
                    indexedDBInstance = e.target.result;
                    resolve();
                };
            });
        }

        async function fetchMovies() {
            await openDatabase();
            // Local Cache Load
            const tx = indexedDBInstance.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = () => {
                if (request.result.length > 0) {
                    allMovies = request.result;
                    renderMovies(allMovies);
                }
            };

            // Server Update
            try {
                const response = await fetch(`https://raw.githubusercontent.com/appcreator05/my12/main/movies.json?t=${new Date().getTime()}`);
                const data = await response.json();
                allMovies = data;
                
                const writeTx = indexedDBInstance.transaction(storeName, "readwrite");
                const writeStore = writeTx.objectStore(storeName);
                writeStore.clear();
                data.forEach(m => writeStore.put(m));
                
                renderMovies(allMovies);
            } catch (err) { console.log("Offline Mode"); }
        }

        
function checkKey() {
    const inputKey = document.getElementById('subKey').value.trim();
    const now = new Date().getTime();
    const deviceId = getDeviceId();

    db.ref("passwords").orderByChild("password").equalTo(inputKey).once("value", snapshot => {

        if (!snapshot.exists()) {
            alert("Invalid Key!");
            return;
        }

        snapshot.forEach(child => {
            const data = child.val();

            if (data.expireAt < now) {
                alert("Key Expired!");
                return;
            }

            if (data.used && data.device_id !== deviceId) {
                alert("Key already used on another device!");
                return;
            }

            // ✅ Activate for this device
            db.ref("passwords/" + child.key).update({
                used: true,
                device_id: deviceId
            });

            alert("Subscription Active!");
            window.location.href = "go:actived";
        });

    });
}

        function showSubscriptionPopup() {
            const popup = document.createElement('div');
            popup.id = "subPopup";
            popup.style.cssText = "position:fixed; top:0; left:0; width:auto; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; align-items:center; justify-content:center; padding:10px;";
            popup.innerHTML = `<div style="width:100%; max-width:350px; background:#000; padding:25px; border-radius:15px; border:2px solid #333; text-align:center;">
                <h2 style="color:#ffc107;">Premium Access</h2>
                <button onclick="window.open('https://appcreator05.blogspot.com/p/paymant-app.html', '_blank')" style="background:#ff0000; color:white; padding:15px; width:100%; border:none; border-radius:50px; margin-bottom:15px; cursor:pointer;"><b><i class="fa fa-shopping-cart" style="font-size:24px"></i> Buy Subscription Key</b></button>
                <input type="text" id="subKey" placeholder="INPUT SUBSCRIPTION KEY" style="padding:15px; width:85%; margin-bottom:15px; border-radius:10px; border:none; text-align:center;">
                <button onclick="checkKey()" style="background:#ff9800; color:black; padding:15px; width:100%; border:none; border-radius:50px; margin-bottom:15px; cursor:pointer;">ACTIVE SUBSCRIPTION</button>
                <button onclick="document.getElementById('subPopup').remove()" style="background:transparent; color:#fff; border:1px solid #555; padding:10px; width:100%; cursor:pointer;">Close</button>
            </div>`;
            document.body.appendChild(popup);
        }

        // --- Gallery UI Functions ---

function renderMovies(moviesToRender, isLoadMore = false) {
    const gallery = document.getElementById('movieGallery');
    
    if (!isLoadMore) {
        gallery.innerHTML = "";
        currentIndex = 20;
        
        // এখানে শুধু 'moviesToRender' ব্যবহার করুন
        let dailyPosts = moviesToRender.slice(0, 5); 
        let oldPosts = moviesToRender.slice(5);

        // Shuffle logic (পুরানো কোড অনুযায়ী)
        for (let i = oldPosts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [oldPosts[i], oldPosts[j]] = [oldPosts[j], oldPosts[i]];
        }
        currentMovies = [...dailyPosts, ...oldPosts];
    }

    // কার্ড রেন্ডারিং এর লজিক আগের মতোই থাকবে
    currentMovies.slice(isLoadMore ? currentIndex - 20 : 0, currentIndex).forEach(m => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => {
    isSubscribed((status) => {
        if (status) {
            showOverlay(m.link);
        } else {
            showSubscriptionPopup();
        }
    });
};
        card.innerHTML = `<span class="rating-badge">★ ${m.rating || '0.0'}</span><img src="${m.poster}" loading="lazy"><div class="movie-title-container"><div class="movie-title">${m.title}</div></div>`;
        gallery.appendChild(card);
    });
}

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500 && currentIndex < currentMovies.length) {
                currentIndex += 20;
                renderMovies(allMovies, true);
            }
        };

        function showOverlay(link) { window.location.href = link; }
        function filterMovies() {
    const cat = document.getElementById('categorySelect').value;
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    // ক্যাটাগরি এবং সার্চ দুটির ওপর ভিত্তি করে ফিল্টার করা
    const filteredList = allMovies.filter(m => {
        const matchesCategory = (cat === "All" || m.category === cat);
        const matchesSearch = (m.title.toLowerCase().includes(searchTerm));
        return matchesCategory && matchesSearch;
    });

    renderMovies(filteredList);
}

        fetchMovies();
window.onload = () => {
    isSubscribed((status) => {
        console.log("Subscription:", status);
    });
};

function showOverlay(link) {
    // ১. ওভারলে তৈরি করা
    const overlay = document.createElement('div');
    overlay.id = "myOverlay"; // একটি আইডি দিলাম যাতে পরে খুঁজে পাওয়া যায়
    overlay.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:9999; color:#fff; font-size:24px; font-weight:bold; font-family:sans-serif;";
    overlay.innerHTML = "Please Wait...";
    document.body.appendChild(overlay);

    // ২. ২ সেকেন্ড পর লিংক ওপেন করা
    setTimeout(() => {
        window.location.href = link;
    }, 2000);

    // ৩. ৫ সেকেন্ড পর নিশ্চিতভাবে ওভারলেটি রিমুভ করা (যদি পেজ লোড হতে দেরি হয়)
    setTimeout(() => {
        const el = document.getElementById('myOverlay');
        if (el) el.remove();
    }, 5000);
}


function toggleSearch() {
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchToggle = document.getElementById('searchToggle');

    if (searchContainer.style.display === 'none') {
        searchContainer.style.display = 'block';
        searchToggle.style.display = 'none'; // সার্চ ওপেন হলে নিচের আইকন হাইড হবে
        searchInput.focus();
    } else {
        searchContainer.style.display = 'none';
        searchToggle.style.display = 'flex'; // সার্চ বন্ধ হলে নিচের আইকন আবার আসবে
        
        // সার্চ বন্ধ করলে ফিল্টার রিসেট করা
        searchInput.value = "";
        filterMovies();
    }
}

function isSubscribed(callback) {
    const now = new Date().getTime();
    const deviceId = getDeviceId();

    db.ref("passwords").once("value", snapshot => {
        let valid = false;

        snapshot.forEach(child => {
            const data = child.val();

            if (
                data.expireAt > now &&
                data.used === true &&
                data.device_id === deviceId
            ) {
                valid = true;
            }
        });

        callback(valid);
    });
}

function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.style.left = (sidebar.style.left === "0px") ? "-250px" : "0px";
}

document.addEventListener("click", function(e) {
    const sidebar = document.getElementById("sidebar");
    const menuIcon = document.querySelector(".menu-icon");

    if (!sidebar.contains(e.target) && !menuIcon.contains(e.target)) {
        sidebar.style.left = "-250px";
    }
});

// Sidebar open/close
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");

menuBtn.onclick = function () {
    if (sidebar.style.left === "0px") {
        sidebar.style.left = "-260px";
    } else {
        sidebar.style.left = "0px";
    }
};

// click outside = close
document.addEventListener("click", function(e) {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.style.left = "-260px";
    }
});
    </script>
